[mcp_servers.awslabs-aws-diagram]
command = "uvx"
args = ["awslabs.aws-diagram-mcp-server"]

[mcp_servers.awslabs-aws-diagram.env]
FASTMCP_LOG_LEVEL = "ERROR"

[mcp_servers.awslabs-aws-documentation]
command = "uvx"
args = ["awslabs.aws-documentation-mcp-server@latest"]

[mcp_servers.awslabs-aws-documentation.env]
FASTMCP_LOG_LEVEL = "ERROR"

[mcp_servers.awslabs-aws-pricing]
command = "uvx"
args = ["awslabs.aws-pricing-mcp-server@latest"]

[mcp_servers.awslabs-aws-pricing.env]
FASTMCP_LOG_LEVEL = "ERROR"

[mcp_servers.awslabs-cfn]
command = "uvx"
args = ["awslabs.cfn-mcp-server@latest", "--readonly"]

[mcp_servers.awslabs-cfn.env]
AWS_PROFILE = "$AWS_PROFILE"

[mcp_servers.serverless]
command = "serverless"
args = ["mcp"]

[mcp_servers.ultracite]
command = "npx"
args = ["-y", "mcp-remote", "https://www.ultracite.ai/api/mcp/mcp"]

[mcp_servers.powertools]
command = "npx"
args = ["-y", "powertools-for-aws-mcp"]
